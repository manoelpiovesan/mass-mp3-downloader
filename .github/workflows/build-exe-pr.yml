name: Build executable on PR

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependency
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller --noconfirm --onefile --windowed --name mass-mp3-downloader downloader_ui.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: mass-mp3-downloader-exe
          path: dist/mass-mp3-downloader.exe
